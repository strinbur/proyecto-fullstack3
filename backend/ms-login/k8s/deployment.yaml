apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-login
  labels:
    app: ms-login
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ms-login
  template:
    metadata:
      labels:
        app: ms-login
    spec:
      containers:
      - name: ms-login
        image: proyecto-fullstack3-ms-login:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8081
        env:
        - name: JAVA_OPTS
          value: "-Xmx256m -Xms128m"
        - name: SENTRY_DSN
          valueFrom:
            secretKeyRef:
              name: sentry-dsn
              key: MS_LOGIN_DSN
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        startupProbe:
          httpGet:
            path: /actuator/health
            port: 8081
          periodSeconds: 5
          failureThreshold: 24
          timeoutSeconds: 3
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8081
          periodSeconds: 10
          failureThreshold: 3
          timeoutSeconds: 3
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8081
          periodSeconds: 5
          failureThreshold: 3
          timeoutSeconds: 3