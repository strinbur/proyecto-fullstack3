services:

  mongodb:
    image: mongo:8
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  ms-login:
    build:
      context: ./backend/ms-login
    container_name: ms-login
    ports:
      - "8081:8081"
    depends_on:
      - mongodb

  ms-inventory:
    build:
      context: ./backend/ms-inventory
    container_name: ms-inventory
    ports:
      - "8082:8082"
    depends_on:
      - mongodb

  ms-cart:
    build:
      context: ./backend/ms-cart
    container_name: ms-cart
    ports:
      - "8083:8083"
    depends_on:
      - mongodb
      - ms-inventory

  ms-order:
    build:
      context: ./backend/ms-order
    container_name: ms-order
    ports:
      - "8084:8084"
    depends_on:
      - mongodb
      - ms-cart
      - ms-inventory

  ms-data-aggregation:
    build:
      context: ./backend/ms-data-aggregation
    container_name: ms-data-aggregation
    ports:
      - "8085:8085"
    depends_on:
      - mongodb
      - ms-order
      - ms-inventory

  ms-analytics:
    build:
      context: ./backend/ms-analytics
    container_name: ms-analytics
    ports:
      - "8086:8086"
    environment:
      - DATA_AGGREGATION_URL=http://ms-data-aggregation:8085
      - JWT_SECRET_KEY=f9A2kL7pQzR4vX9mN3bH5jW8sT1yC6xD
      - JWT_ALGORITHM=HS256
      - CRITICAL_STOCK_THRESHOLD=5
      - MONGODB_URL=mongodb://mongodb:27017
      - MONGODB_DATABASE=ms-analytics
    depends_on:
      - ms-data-aggregation
      - mongodb

  ms-reporting:
    build:
      context: ./backend/ms-reporting
    container_name: ms-reporting
    ports:
      - "8087:8087"
    environment:
      - ANALYTICS_URL=http://ms-analytics:8086
      - JWT_SECRET_KEY=f9A2kL7pQzR4vX9mN3bH5jW8sT1yC6xD
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/reporting_bd
    depends_on:
      - ms-analytics
      - mongodb

  ms-bff:
    build:
      context: ./backend/bff
    container_name: ms-bff
    ports:
      - "8080:8080"
    environment:
      - MS_REPORTING_URL=http://ms-reporting:8087
      - MS_ANALYTICS_URL=http://ms-analytics:8086
      - MS_INVENTORY_URL=http://ms-inventory:8082
      - MS_ORDER_URL=http://ms-order:8084
      - MS_CART_URL=http://ms-cart:8083
      - MS_LOGIN_URL=http://ms-login:8081
    depends_on:
      - ms-login
      - ms-inventory
      - ms-cart
      - ms-order
      - ms-data-aggregation
      - ms-analytics
      - ms-reporting

  front:
    build:
      context: ./frontend
    container_name: front
    ports:
      - "5173:5173"
    depends_on:
      - ms-bff

volumes:
  mongo_data: